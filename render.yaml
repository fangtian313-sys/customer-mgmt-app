services:
  - type: web
    name: customer-mgmt-app
    runtime: python
    region: oregon
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./backend/customer_mgmt.db
      - key: JWT_SECRET
        generateValue: true
      - key: SMS_PROVIDER
        value: mock
      - key: PYTHON_VERSION
        value: "3.13.0"
