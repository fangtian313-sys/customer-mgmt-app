version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/customer_mgmt.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SMS_PROVIDER=mock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
